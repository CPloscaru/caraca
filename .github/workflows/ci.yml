name: CI

on:
  pull_request:
    branches: [main]

jobs:
  "Lint, Type-check & Build":
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci

      - run: npm run lint

      - run: npm run type-check

      - run: npm run build
